- name: 運動
  triggers:
    - { type: cron, value: "20 09 * * *" }
  actions:
    - { command: "C:\\Projects\\Toaster\\src\\Toaster.vbs", args: "運動" }

- name: 昼食
  triggers:
    - { type: cron, value: "00 12 * * *" }
  actions:
    - { command: "C:\\Projects\\Toaster\\src\\Toaster.vbs", args: "昼食" }

- name: 夕食
  triggers:
    - { type: cron, value: "00 18 * * *" }
  actions:
    - { command: "C:\\Projects\\Toaster\\src\\Toaster.vbs", args: "夕食" }

- name: お風呂
  triggers:
    - { type: cron, value: "15 22 * * *" }
  actions:
    - { command: "C:\\Projects\\Toaster\\src\\Toaster.vbs", args: "お風呂" }

- name: ストレッチ
  triggers:
    - { type: cron, value: "45 23 * * *" }
  actions:
    - { command: "C:\\Projects\\Toaster\\src\\Toaster.vbs", args: "ストレッチ" }

- name: Holiday
  triggers:
    - { type: cron, value: "00 20 * * *" }
  actions:
    - { command: "C:\\Projects\\my-holidays\\HolidayNotifier.vbs" }

- name: setup
  triggers:
    - { type: startup, value: "00:00" }
  actions:
    - { command: "C:\\Users\\PRO\\.startup\\CustomStartupRunas.vbs" }
  settings:
    run_level: 1

- name: SyncTime
  triggers:
    - { type: boot, value: "00:00" }
  actions:
    - {
        command: "%windir%\\system32\\sc.exe",
        args: "start w32time task_started",
      }
  settings:
    run_level: 1
    logon_type: S4U
