- name: startup
  trigger: { type: startup, value: "00:00:01" }
  action:
    {
      command: "pwsh",
      args: '-File C:\Projects\dotfiles\undotfiles\startup.ps1',
      working_directory: 'C:\Projects\runx',
    }
  setting: { run_as: true }

- name: SyncTime
  trigger: { type: boot, value: "00:00" }
  action: { command: "%windir%\\system32\\sc.exe", args: "start w32time task_started" }
  setting: { run_as: true, logon_type: s4u }
