{{- /* chezmoi:modify-template */ -}}
{{-
  .chezmoi.stdin
  | replaceAllRegex "(FilePath|FFFilePath)=.*" "${1}=D:/Videos/OBS"
  | replaceAllRegex "(RecFormat2)=.*" "${1}=mp4"
  | replaceAllRegex "(RecRB)=.*" "${1}=true"
  | replaceAllRegex "(RecRBTime)=.*" "${1}=1800"
  | replaceAllRegex "(StreamEncoder|FFFilePath|RecEncoder)=.*" "${1}=x264"
-}}
