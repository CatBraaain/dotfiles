{{- /* chezmoi:modify-template */ -}}
{{-
  .chezmoi.stdin
  | replaceAllRegex "(RecFormat2)=.*" "${1}=hybrid_mp4"
  | replaceAllRegex "(RecRB)=.*" "${1}=true"
  | replaceAllRegex "(RecRBTime)=.*" "${1}=1800"
  | replaceAllRegex "(RecRBSize)=.*" "${1}=1024"
  | replaceAllRegex "(StreamEncoder|RecEncoder)=.*" "${1}=x264"
-}}
